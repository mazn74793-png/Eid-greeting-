<style>
/* ════════════════════════════════════════════════
   ROOT + RESET
════════════════════════════════════════════════ */
:root {
  --gold:       #D4AF37;
  --gold-light: #F5D97D;
  --gold-dim:   #8B6914;
  --cream:      #FFF8E7;
  --dark:       #070503;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:auto; }
body { background:var(--dark); overflow-x:hidden; cursor:none; }

/* ════════════════════════════════════════════════
   CANVAS
════════════════════════════════════════════════ */
#c {
  position:fixed; inset:0;
  width:100vw; height:100vh;
  z-index:1; display:block;
}

/* ════════════════════════════════════════════════
   SCROLL SPACE
════════════════════════════════════════════════ */
#scroll-space {
  height:700vh; position:relative;
  z-index:2; pointer-events:none;
}

/* ════════════════════════════════════════════════
   FILM GRAIN
════════════════════════════════════════════════ */
body::after {
  content:''; position:fixed; inset:0; z-index:50;
  pointer-events:none; opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px 256px;
  animation:grain 0.5s steps(2) infinite;
}
@keyframes grain {
  0%  { transform:translate(0,0); }    25% { transform:translate(-2%,-1%); }
  50% { transform:translate(1%,2%); }  75% { transform:translate(-1%,1%); }
  100%{ transform:translate(2%,-2%); }
}

/* ════════════════════════════════════════════════
   VIGNETTE (CSS – always-on ambient)
════════════════════════════════════════════════ */
#vignette {
  position:fixed; inset:0; z-index:3; pointer-events:none;
  background:radial-gradient(ellipse 88% 88% at 50% 50%,
    transparent 36%, rgba(7,5,3,0.45) 72%, rgba(7,5,3,0.88) 100%);
  transition:opacity 0.8s;
}
/* Dramatic vignette that intensifies per-scene */
#vignette-drama {
  position:fixed; inset:0; z-index:4; pointer-events:none;
  background:radial-gradient(ellipse 70% 70% at 50% 50%,
    transparent 20%, rgba(7,5,3,0.0) 50%, rgba(7,5,3,1.0) 100%);
  opacity:0; transition:opacity 1.2s;
}

/* ════════════════════════════════════════════════
   CURSOR
════════════════════════════════════════════════ */
#cursor {
  position:fixed; width:8px; height:8px;
  background:var(--gold); border-radius:50%;
  pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  mix-blend-mode:difference; will-change:transform;
  transition:transform 0.1s, opacity 0.2s;
}
#cursor-ring {
  position:fixed; width:32px; height:32px;
  border:1px solid rgba(212,175,55,0.5); border-radius:50%;
  pointer-events:none; z-index:9998;
  transform:translate(-50%,-50%); will-change:transform;
  transition:width 0.3s, height 0.3s, border-color 0.2s;
}
body.hovering #cursor-ring {
  width:52px; height:52px;
  border-color:rgba(212,175,55,0.9);
}

/* ════════════════════════════════════════════════
   LOADING SCREEN
════════════════════════════════════════════════ */
#loading {
  position:fixed; inset:0; background:#000;
  z-index:200; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px;
}
.load-presents {
  font-family:'Cormorant Garamond',serif; font-weight:300; font-style:italic;
  font-size:clamp(13px,2vw,16px); color:rgba(212,175,55,0.7);
  letter-spacing:10px; text-transform:uppercase; opacity:0;
}
.load-title {
  font-family:'Amiri',serif; font-size:clamp(32px,6vw,52px);
  color:var(--gold); opacity:0;
  text-shadow:0 0 40px rgba(212,175,55,0.6); letter-spacing:4px;
}
.load-bar-wrap {
  width:180px; height:1px;
  background:rgba(212,175,55,0.15); overflow:hidden; opacity:0;
}
.load-bar {
  height:100%; width:0%;
  background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-light));
}

/* ════════════════════════════════════════════════
   SCENE LABEL
════════════════════════════════════════════════ */
#scene-label {
  position:fixed; top:28px; left:50%;
  transform:translateX(-50%); z-index:20;
  text-align:center; pointer-events:none; opacity:0;
}
.scene-num {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:10px; color:rgba(212,175,55,0.4); letter-spacing:6px;
  text-transform:uppercase; display:block;
}
.scene-name {
  font-family:'Cormorant Garamond',serif; font-weight:400; font-style:italic;
  font-size:13px; color:rgba(212,175,55,0.6); letter-spacing:4px;
  text-transform:uppercase; display:block; margin-top:3px;
}

/* ════════════════════════════════════════════════
   PROGRESS DOTS
════════════════════════════════════════════════ */
#dots {
  position:fixed; right:28px; top:50%; transform:translateY(-50%);
  z-index:20; display:flex; flex-direction:column;
  gap:14px; opacity:0; transition:opacity 0.5s;
}
.dot {
  width:3px; height:3px; border-radius:50%;
  background:rgba(212,175,55,0.25); cursor:none;
  transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
}
.dot.active {
  background:var(--gold); box-shadow:0 0 6px var(--gold);
  height:18px; border-radius:2px;
}

/* ════════════════════════════════════════════════
   SCROLL HINT
════════════════════════════════════════════════ */
#scroll-hint {
  position:fixed; bottom:36px; left:50%;
  transform:translateX(-50%); z-index:20;
  display:flex; flex-direction:column; align-items:center;
  gap:10px; opacity:0; transition:opacity 0.8s; pointer-events:none;
}
.sh-text {
  font-family:'Cormorant Garamond',serif; font-size:10px;
  color:rgba(212,175,55,0.45); letter-spacing:5px; text-transform:uppercase;
}
.sh-line {
  width:1px; height:36px;
  background:linear-gradient(to bottom,rgba(212,175,55,0.5),transparent);
  animation:shPulse 2.2s ease-in-out infinite;
}
@keyframes shPulse {
  0%,100%{opacity:0.3;transform:scaleY(1);}
  50%    {opacity:1.0;transform:scaleY(1.1);}
}

/* ════════════════════════════════════════════════
   MESSAGE OVERLAY — cinematic text reveal
════════════════════════════════════════════════ */
#msg-overlay {
  position:fixed; inset:0; z-index:15;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  pointer-events:none; opacity:0;
}
.msg-divider {
  width:60px; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0; margin:16px 0;
}
.msg-main {

<script>
/* ══════════════════════════════════════════════════════════════════
   WORLD-CLASS CINEMATIC EID AL-FITR EXPERIENCE  ·  v3
   Mazen  ·  Three.js r128 + GSAP + Web Audio API
══════════════════════════════════════════════════════════════════ */

/* ────────────────────────────────────────────────────────────────
   SECTION A · SETUP & UTILITIES
──────────────────────────────────────────────────────────────── */
const lerp  = (a,b,t) => a+(b-a)*t;
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const ease  = t => t<0.5?2*t*t:-1+(4-2*t)*t;
const easeOut = t => 1-(1-t)*(1-t)*(1-t);
const sleep = ms => new Promise(r => setTimeout(r,ms));

// Custom name greeting
const params    = new URLSearchParams(location.search);
const guestName = params.get('name');
document.getElementById('mm').textContent = guestName
  ? `عيد مبارك يا ${guestName}` : 'عيد مبارك';
if (!guestName) {
  const nh = document.getElementById('name-hint');
  nh.style.opacity = '1'; nh.style.transition = 'opacity 1s 6s';
}

// Seeded noise-like helper (3 sine harmonics → smooth pseudo-random)
const noise1D = (t,seed=0) =>
  Math.sin(t*1.7+seed)*0.5 + Math.sin(t*3.1+seed*1.3)*0.3 + Math.sin(t*5.9+seed*0.7)*0.2;

// Post-processing is always available (fully inlined above)

/* ────────────────────────────────────────────────────────────────
   SECTION B · RENDERER  +  POST-PROCESSING PIPELINE
──────────────────────────────────────────────────────────────── */
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({
  canvas, antialias:true, powerPreference:'high-performance',
  logarithmicDepthBuffer:false,
});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping        = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;
renderer.outputEncoding      = THREE.sRGBEncoding;

// ── Shaders ──────────────────────────────────────────────────────
// Cinematic vignette + warm color grade
const VignetteShader = {
  uniforms: {
    tDiffuse:  { value:null },
    darkness:  { value:1.55 },
    offset:    { value:1.05 },
    warmth:    { value:0.06 },
    contrast:  { value:1.04 },
  },
  vertexShader: `varying vec2 vUv;
    void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float darkness,offset,warmth,contrast;
    varying vec2 vUv;
    void main(){
      vec4 tx = texture2D(tDiffuse,vUv);
      // Warm tint
      tx.r = clamp(tx.r+warmth*0.10,0.,1.);
      tx.g = clamp(tx.g+warmth*0.04,0.,1.);
      tx.b = clamp(tx.b-warmth*0.02,0.,1.);
      // Contrast
      tx.rgb = clamp((tx.rgb-0.5)*contrast+0.5,0.,1.);
      // Vignette
      vec2 uv=(vUv-0.5)*offset;
      float v=1.-dot(uv,uv);
      v=clamp(pow(v,darkness),0.,1.);
      gl_FragColor=vec4(tx.rgb*v,tx.a);
    }`
};

// DOF simulation – radial focus-pull blur
const DOFShader = {
  uniforms: {
    tDiffuse: { value:null },
    blur:     { value:0.0 },
    focus:    { value:new THREE.Vector2(0.5,0.5) },
  },
  vertexShader: `varying vec2 vUv;
    void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float blur;
    uniform vec2 focus;
    varying vec2 vUv;
    void main(){
      if(blur<0.0001){ gl_FragColor=texture2D(tDiffuse,vUv); return; }
      vec4 col=vec4(0.);float total=0.;
      float dist=length(vUv-focus)*0.6;
      float b=blur*dist;
      for(float i=-3.;i<=3.;i+=1.)for(float j=-3.;j<=3.;j+=1.){
        vec2 off=vec2(i,j)*b*0.0035;
        col+=texture2D(tDiffuse,vUv+off); total+=1.;
      }
      gl_FragColor=col/total;
    }`
};

// ── EffectComposer pipeline ────────────────────────────────────
let composer, bloomPass, vigPass, dofPass;

// NOTE: EffectComposer is set up AFTER scene+camera are created below.
// See "Init composer" block in SECTION C.
let composer, bloomPass, vigPass, dofPass;

/* ────────────────────────────────────────────────────────────────
   SECTION C · SCENE + CAMERA
──────────────────────────────────────────────────────────────── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x070503);
scene.fog = new THREE.FogExp2(0x070503, 0.028);

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 300);
camera.position.set(0,22,42);

// ── Init EffectComposer AFTER scene + camera exist ────────────
composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.7, 0.4, 0.72);
composer.addPass(bloomPass);
dofPass = new THREE.ShaderPass(DOFShader);
composer.addPass(dofPass);
vigPass = new THREE.ShaderPass(VignetteShader);
vigPass.renderToScreen = true;
composer.addPass(vigPass);

/* ────────────────────────────────────────────────────────────────
   SECTION D · SOUND SYSTEM (Web Audio API)
──────────────────────────────────────────────────────────────── */
let audioCtx=null, masterGain=null, ambientDrone=null;
let soundEnabled=true, soundInited=false;

function initSound(){
  if(soundInited) return;
  soundInited = true;
  try{
    audioCtx  = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.0;
    masterGain.connect(audioCtx.destination);

    // ─ Ambient drone: low-pass filtered brownian noise + two sine tones ─
    const bufSize = audioCtx.sampleRate * 4;
    const nBuf    = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const nData   = nBuf.getChannelData(0);
    let last=0;
    for(let i=0;i<bufSize;i++){
      const w=Math.random()*2-1;
      last = (last+0.02*w)*0.98;  // brownian / low-frequency noise
      nData[i] = last;
    }
    const nSrc = audioCtx.createBufferSource();
    nSrc.buffer = nBuf; nSrc.loop = true;
    const lp = audioCtx.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.value=160; lp.Q.value=0.4;
    const nGain = audioCtx.createGain(); nGain.gain.value=0.06;
    nSrc.connect(lp); lp.connect(nGain); nGain.connect(masterGain);
    nSrc.start();

    // Sub-bass sine A1
    const osc1 = audioCtx.createOscillator();
    osc1.type='sine'; osc1.frequency.value=55;
    const g1  = audioCtx.createGain(); g1.gain.value=0.025;
    osc1.connect(g1); g1.connect(masterGain); osc1.start();

    // Harmonic E2
    const osc2 = audioCtx.createOscillator();
    osc2.type='triangle'; osc2.frequency.value=82;
    const g2 = audioCtx.createGain(); g2.gain.value=0.012;
    osc2.connect(g2); g2.connect(masterGain); osc2.start();

    ambientDrone = { nGain, g1, g2 };

    // Fade in ambient
    masterGain.gain.setTargetAtTime(soundEnabled?1.0:0.0, audioCtx.currentTime, 1.5);
  } catch(e){ console.warn('Audio failed:', e); }
}

function playCrumble(){
  if(!audioCtx||!soundEnabled) return;
  const bufLen = audioCtx.sampleRate * 0.35;
  const buf    = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data   = buf.getChannelData(0);
  for(let i=0;i<bufLen;i++)
    data[i] = (Math.random()*2-1) * Math.exp(-i/(audioCtx.sampleRate*0.07));
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const bp  = audioCtx.createBiquadFilter(); bp.type='bandpass';
  bp.frequency.value=1800; bp.Q.value=1.8;
  const g = audioCtx.createGain(); g.gain.value=0.28;
  src.connect(bp); bp.connect(g); g.connect(masterGain); src.start();
}

function playFireworkSFX(){
  if(!audioCtx||!soundEnabled) return;
  const now = audioCtx.currentTime;
  // Rising tone
  const osc = audioCtx.createOscillator(); osc.type='sine';
  osc.frequency.setValueAtTime(350, now);
  osc.frequency.exponentialRampToValueAtTime(1100, now+0.35);
  const g1 = audioCtx.createGain();
  g1.gain.setValueAtTime(0.12, now);
  g1.gain.exponentialRampToValueAtTime(0.001, now+0.4);
  osc.connect(g1); g1.connect(masterGain);
  osc.start(now); osc.stop(now+0.4);
  // Burst noise
  const bLen = audioCtx.sampleRate*0.55;
  const bBuf = audioCtx.createBuffer(1,bLen,audioCtx.sampleRate);
  const bDat = bBuf.getChannelData(0);
  for(let i=0;i<bLen;i++)
    bDat[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.12));
  const bSrc = audioCtx.createBufferSource(); bSrc.buffer=bBuf;
  const g2   = audioCtx.createGain(); g2.gain.value=0.18;
  bSrc.connect(g2); g2.connect(masterGain); bSrc.start(now+0.32);
}

// Mute toggle
const muteBtn = document.getElementById('mute-btn');
muteBtn.addEventListener('click', ()=>{
  soundEnabled = !soundEnabled;
  muteBtn.textContent = soundEnabled ? '♪' : '♪̶';
  muteBtn.classList.toggle('muted', !soundEnabled);
  if(masterGain) masterGain.gain.setTargetAtTime(soundEnabled?1.0:0.0, audioCtx.currentTime, 0.3);
}, {passive:true});

/* ────────────────────────────────────────────────────────────────
   SECTION E · LIGHTING SYSTEM
──────────────────────────────────────────────────────────────── */
const ambient = new THREE.AmbientLight(0x1a0e04, 0.4);
scene.add(ambient);

// Key spotlight (warm golden)
const key = new THREE.SpotLight(0xFFD08A, 0, 65, Math.PI/7, 0.38, 1.1);
key.position.set(4, 18, 6);
key.castShadow = true;
key.shadow.mapSize.setScalar(2048);
key.shadow.camera.near=1; key.shadow.camera.far=55; key.shadow.bias=-0.001;
const keyTarget = new THREE.Object3D(); keyTarget.position.set(0,0,0);
scene.add(keyTarget); key.target=keyTarget; scene.add(key);

// Fill, rim, bounce
const fill   = new THREE.PointLight(0xFF8833, 0, 45); fill.position.set(-9,6,7);   scene.add(fill);
const rim    = new THREE.PointLight(0xFFCC55, 0, 32); rim.position.set(2,3,-9);     scene.add(rim);
const bounce = new THREE.PointLight(0xFF9922, 0, 24); bounce.position.set(0,-2.5,2);scene.add(bounce);

// Subtle under-glow (accent)
const under  = new THREE.PointLight(0xCC7700, 0, 18); under.position.set(0,-0.5,4); scene.add(under);

// Celebration lights
const cel1 = new THREE.PointLight(0xFFD700,0,90); cel1.position.set(16,22,4);  scene.add(cel1);
const cel2 = new THREE.PointLight(0xFF6600,0,90); cel2.position.set(-16,18,-4);scene.add(cel2);
const cel3 = new THREE.PointLight(0xFFAA00,0,70); cel3.position.set(0,26,-12); scene.add(cel3);

// ── Light flicker system ──────────────────────────────────────
const FLICKER_BASE = { key:3.0, fill:1.6, rim:1.0, bounce:0.8, under:0.5 };
let flickerTime = 0;
function tickFlicker(dt){
  flickerTime += dt;
  const n = noise1D(flickerTime*2.1, 0);
  const fi = 1.0 + n*0.06; // ±6% flicker
  key.intensity    = FLICKER_BASE.key    * fi * lightReveal;
  fill.intensity   = FLICKER_BASE.fill   * fi * lightReveal;
  rim.intensity    = FLICKER_BASE.rim    * fi * lightReveal;
  bounce.intensity = FLICKER_BASE.bounce * fi * lightReveal;
  under.intensity  = FLICKER_BASE.under  * fi * lightReveal;
}
let lightReveal = 0; // 0→1 during scene reveal

// ── Lens flare sprites ────────────────────────────────────────
// Build a radial gradient texture procedurally
function makeFlareTex(size=128){
  const cv=document.createElement('canvas'); cv.width=cv.height=size;
  const cx=cv.getContext('2d');
  const g=cx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  g.addColorStop(0,'rgba(255,230,130,0.95)');
  g.addColorStop(0.18,'rgba(255,200,80,0.55)');
  g.addColorStop(0.55,'rgba(200,140,20,0.12)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=g; cx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(cv);
}
const flareTex = makeFlareTex(128);

const flares = [];
const flareLights = [
  {light:key,    scale:2.2},
  {light:fill,   scale:1.2},
];
flareLights.forEach(({light,scale})=>{
  const mat = new THREE.SpriteMaterial({
    map:flareTex, color:0xFFD080, transparent:true,
    opacity:0, blending:THREE.AdditiveBlending, depthWrite:false,
  });
  const sp = new THREE.Sprite(mat); sp.scale.setScalar(scale);
  sp.position.copy(light.position); scene.add(sp);
  flares.push({sprite:sp, light, base:scale});
});

function tickFlares(){
  flares.forEach(f=>{
    const v = clamp(f.light.intensity/3, 0, 1);
    f.sprite.material.opacity = v * 0.35;
    f.sprite.position.copy(f.light.position);
  });
}

/* ────────────────────────────────────────────────────────────────
   SECTION F · WARM PROCEDURAL ENVIRONMENT MAP
──────────────────────────────────────────────────────────────── */
(function buildEnvMap(){
  const W=64, H=32;
  const data=new Uint8Array(W*H*4);
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      const ty = y/H;
      // Base: very dark warm
      data[i]=18+ty*12; data[i+1]=8+ty*5; data[i+2]=2; data[i+3]=255;
      // Key light hotspot (upper-left quadrant of env)
      const dx=(x/W)-0.35, dy=(y/H)-0.12;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<0.22){
        const s=Math.pow(1-d/0.22,2.2);
        data[i]  =Math.min(255,data[i]  +Math.floor(s*160));
        data[i+1]=Math.min(255,data[i+1]+Math.floor(s*100));
        data[i+2]=Math.min(255,data[i+2]+Math.floor(s*30));
      }
      // Subtle fill glow (left side)
      const dx2=(x/W)-0.08, dy2=(y/H)-0.55;
      const d2=Math.sqrt(dx2*dx2+dy2*dy2);
      if(d2<0.18){
        const s2=Math.pow(1-d2/0.18,1.8)*0.4;
        data[i]  =Math.min(255,data[i]  +Math.floor(s2*60));
        data[i+1]=Math.min(255,data[i+1]+Math.floor(s2*30));
      }
    }
  }
  const envTex = new THREE.DataTexture(data,W,H,THREE.RGBAFormat);
  envTex.mapping = THREE.EquirectangularReflectionMapping;
  envTex.needsUpdate = true;
  try{
    const pmrem  = new THREE.PMREMGenerator(renderer);
    const envMap = pmrem.fromEquirectangular(envTex).texture;
    scene.environment = envMap;
    pmrem.dispose(); envTex.dispose();
  }catch(e){}
})();

/* ────────────────────────────────────────────────────────────────
   SECTION G · FLOOR + TRAY
──────────────────────────────────────────────────────────────── */
const FLOOR_Y=-3.8;
const floorMesh=new THREE.Mesh(
  new THREE.PlaneGeometry(120,120),
  new THREE.MeshPhysicalMaterial({color:0x0C0805,roughness:0.95,metalness:0.06})
);
floorMesh.rotation.x=-Math.PI/2; floorMesh.position.y=FLOOR_Y;
floorMesh.receiveShadow=true; floorMesh.visible=false; scene.add(floorMesh);

// Tray
const trayMat=new THREE.MeshPhysicalMaterial({
  color:0xC8941C,roughness:0.15,metalness:0.90,
  reflectivity:1,clearcoat:0.35,clearcoatRoughness:0.18,
  envMapIntensity:1.6,
});
const trayGroup=new THREE.Group();

const trayBase=new THREE.Mesh(new THREE.CylinderGeometry(5.2,5.0,0.18,72),trayMat);
trayBase.castShadow=true; trayBase.receiveShadow=true; trayGroup.add(trayBase);

const trayRim=new THREE.Mesh(new THREE.TorusGeometry(5.1,0.28,20,80),trayMat);
trayRim.rotation.x=Math.PI/2; trayRim.position.y=0.12;
trayRim.castShadow=true; trayGroup.add(trayRim);

[3.8,2.5,1.2].forEach(r=>{
  const ring=new THREE.Mesh(new THREE.TorusGeometry(r,0.04,8,64),trayMat);
  ring.rotation.x=Math.PI/2; ring.position.y=0.12; trayGroup.add(ring);
});
for(let i=0;i<20;i++){
  const a=(i/20)*Math.PI*2;
  const dot=new THREE.Mesh(new THREE.SphereGeometry(0.07,8,8),trayMat);
  dot.position.set(Math.cos(a)*4.9,0.32,Math.sin(a)*4.9); trayGroup.add(dot);
}
const medal=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.6,0.06,32),trayMat);
medal.position.y=0.14; trayGroup.add(medal);

trayGroup.position.y=0.2; scene.add(trayGroup);

/* ────────────────────────────────────────────────────────────────
   SECTION H · KA7K COOKIES (realistic Egyptian disk shape from v2)
──────────────────────────────────────────────────────────────── */
const COOKIE_DEFS=[
  {x:0.0,  y:0.44,z:0.0,  s:1.10,rx:0.05, ry:0.0,  rz:0.03 },
  {x:2.05, y:0.43,z:0.0,  s:0.96,rx:0.04, ry:1.15, rz:0.07 },
  {x:-2.05,y:0.43,z:0.0,  s:0.96,rx:0.05, ry:-0.72,rz:-0.06},
  {x:0.0,  y:0.43,z:2.05, s:0.96,rx:0.06, ry:0.54, rz:0.08 },
  {x:0.0,  y:0.43,z:-2.05,s:0.94,rx:0.03, ry:-0.28,rz:-0.05},
  {x:1.45, y:0.43,z:1.45, s:0.90,rx:0.08, ry:2.10, rz:0.10 },
  {x:-1.45,y:0.43,z:-1.45,s:0.90,rx:0.07, ry:0.88, rz:-0.09},
  {x:1.45, y:0.43,z:-1.45,s:0.88,rx:0.09, ry:-1.48,rz:0.11 },
  {x:-1.45,y:0.43,z:1.45, s:0.88,rx:0.06, ry:2.98, rz:-0.10},
  {x:3.55, y:0.40,z:0.70, s:0.80,rx:0.16, ry:1.82, rz:0.18 },
  {x:-3.55,y:0.40,z:-0.70,s:0.80,rx:0.14, ry:-0.58,rz:-0.15},
];
const cookieObjects=[];

function buildKa7k({x,y,z,s,rx,ry,rz}){
  const group=new THREE.Group();
  const R=0.70*s, H=0.30*s, SEG=52;

  const hue=0.065+(Math.random()-0.5)*0.022;
  const sat=0.55+Math.random()*0.14;
  const lit=0.42+Math.random()*0.11;
  const bakedCol  =new THREE.Color().setHSL(hue,sat,lit);
  const darkCol   =new THREE.Color().setHSL(hue,sat+0.08,lit-0.11);
  const grooveCol =new THREE.Color().setHSL(hue,sat+0.06,lit-0.14);

  const bodyMat=new THREE.MeshPhysicalMaterial({
    color:bakedCol, roughness:0.82+Math.random()*0.08, metalness:0.0,
    clearcoat:0.04, clearcoatRoughness:0.97,
    emissive:new THREE.Color().setHSL(hue,0.6,0.04), // subtle SSS warmth
    envMapIntensity:0.25,
  });

  // ── Organically deformed cylinder body ──
  const bodyGeo=new THREE.CylinderGeometry(R,R*0.955,H,SEG,5,false);
  const pos=bodyGeo.attributes.position;
  const w1=Math.random()*Math.PI*2, w2=Math.random()*Math.PI*2, w3=Math.random()*Math.PI*2;
  for(let vi=0;vi<pos.count;vi++){
    const vx=pos.getX(vi),vy=pos.getY(vi),vz=pos.getZ(vi);
    const dist=Math.sqrt(vx*vx+vz*vz);
    const angle=Math.atan2(vz,vx);
    if(dist>0.01&&Math.abs(vy)<H*0.48){
      const wobble=(Math.sin(angle*5+w1)*0.017+Math.cos(angle*3+w2)*0.011+Math.sin(angle*2+w3)*0.013)*s;
      const nr=dist+wobble;
      pos.setX(vi,Math.cos(angle)*nr); pos.setZ(vi,Math.sin(angle)*nr);
    }
    if(vy>H*0.38&&dist<R*1.05){ const t2=dist/R; pos.setY(vi,vy+(1-t2*t2)*H*0.18); }
    if(vy<-H*0.38&&dist<R*0.9){ const t2=dist/R; pos.setY(vi,vy+(1-t2*t2)*H*0.04); }
  }
  bodyGeo.computeVertexNormals();
  const body=new THREE.Mesh(bodyGeo,bodyMat); body.castShadow=true; body.receiveShadow=true;
  group.add(body);

  // Bottom darkened face
  group.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(R*0.90,R*0.85,0.012*s,SEG),
    new THREE.MeshPhysicalMaterial({color:darkCol,roughness:0.94,metalness:0})),
    {position:{x:0,y:-H*0.51,z:0}}));

  // ── Stamp pattern ──
  const pY=H*0.51;
  const gMat=new THREE.MeshPhysicalMaterial({color:grooveCol,roughness:0.92,metalness:0});
  // Outer ring
  const or=new THREE.Mesh(new THREE.TorusGeometry(R*0.76,0.022*s,6,52),gMat);
  or.rotation.x=Math.PI/2; or.position.y=pY; group.add(or);
  // Middle ring
  const mr=new THREE.Mesh(new THREE.TorusGeometry(R*0.46,0.018*s,6,44),gMat);
  mr.rotation.x=Math.PI/2; mr.position.y=pY; group.add(mr);
  // Radial lines
  const RAY_N=(Math.random()>0.45)?8:6;
  for(let ri=0;ri<RAY_N;ri++){
    const a=(ri/RAY_N)*Math.PI*2;
    const ray=new THREE.Mesh(new THREE.BoxGeometry(R*0.52,0.018*s,0.016*s),gMat);
    ray.position.set(Math.cos(a)*R*0.37,pY,Math.sin(a)*R*0.37);
    ray.rotation.y=-a; group.add(ray);
    const pd=new THREE.Mesh(new THREE.CylinderGeometry(0.038*s,0.038*s,0.022*s,8),gMat);
    pd.position.set(Math.cos(a)*R*0.46,pY,Math.sin(a)*R*0.46); group.add(pd);
  }
  // Centre medallion
  const cMat=new THREE.MeshPhysicalMaterial({color:new THREE.Color().setHSL(hue,sat+0.10,lit-0.17),roughness:0.88,metalness:0});
  group.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.11*s,0.11*s,0.025*s,18),cMat),{position:{x:0,y:pY,z:0}}));

  // ── Powdered sugar coating ──
  const sMat=new THREE.MeshPhysicalMaterial({color:0xFFFDF8,roughness:1.0,metalness:0,transparent:true,opacity:0.52});
  group.add(new THREE.Mesh(new THREE.CylinderGeometry(R+0.016*s,R*0.96+0.012*s,H*1.04,SEG,1,true),sMat));
  group.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(R*0.92,R*0.92,0.012*s,SEG),sMat),{position:{x:0,y:H*0.52,z:0}}));

  // Sugar granules
  const granMat=new THREE.MeshBasicMaterial({color:0xFFFEFC,transparent:true,opacity:0.75});
  const GRAN=14+Math.floor(Math.random()*10);
  for(let gi=0;gi<GRAN;gi++){
    const ga=Math.random()*Math.PI*2, gr=Math.random()*R*0.84, t=gr/R;
    const g2=new THREE.Mesh(new THREE.SphereGeometry(0.016*s+Math.random()*0.013*s,4,3),granMat);
    g2.position.set(Math.cos(ga)*gr, H*0.5+(1-t*t)*H*0.18+0.018*s, Math.sin(ga)*gr); group.add(g2);
  }

  // Surface bumps
  const bMat=new THREE.MeshPhysicalMaterial({color:new THREE.Color().setHSL(hue,sat,lit+0.05),roughness:0.92,metalness:0,transparent:true,opacity:0.35});
  const BUMP=6+Math.floor(Math.random()*5);
  for(let bi=0;bi<BUMP;bi++){
    const ba=Math.random()*Math.PI*2, br=(0.28+Math.random()*0.52)*R, bt=br/R;
    const bump=new THREE.Mesh(new THREE.SphereGeometry(0.030*s+Math.random()*0.022*s,6,4),bMat);
    bump.position.set(Math.cos(ba)*br,H*0.5+(1-bt*bt)*H*0.18+0.01,Math.sin(ba)*br);
    bump.scale.y=0.30; group.add(bump);
  }

  // Rolled edge ring
  const eMat=new THREE.MeshPhysicalMaterial({color:new THREE.Color().setHSL(hue,sat-0.04,lit+0.07),roughness:0.88,metalness:0});
  const er=new THREE.Mesh(new THREE.TorusGeometry(R*0.97,0.038*s,10,52),eMat);
  er.rotation.x=Math.PI/2; er.position.y=0; group.add(er);

  group.position.set(x,y,z); group.rotation.set(rx,ry,rz);
  trayGroup.add(group);
  cookieObjects.push({
    mesh:group, origPos:new THREE.Vector3(x,y,z), origRot:new THREE.Euler(rx,ry,rz),
    vel:new THREE.Vector3(),
    angVel:new THREE.Vector3((Math.random()-0.5)*0.06,(Math.random()-0.5)*0.06,(Math.random()-0.5)*0.06),
    radius:R+0.10, physics:false, settled:false, hovered:false,
  });
}

let tpProgress=0, tpDir=0, tpBuilt=false;

async function buildTextTargets(){
  await document.fonts.ready;
  const W=580,H=130;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx2=cv.getContext('2d');
  ctx2.fillStyle='#000'; ctx2.fillRect(0,0,W,H);
  ctx2.fillStyle='#fff'; ctx2.font='bold 78px Amiri';
  ctx2.textAlign='center'; ctx2.textBaseline='middle'; ctx2.direction='rtl';
  const label = guestName ? `عيد مبارك يا ${guestName}` : 'عيد مبارك';
  ctx2.fillText(label,W/2,H/2);
  const data=ctx2.getImageData(0,0,W,H).data;
  const pixels=[];
  for(let py=0;py<H;py+=3) for(let px=0;px<W;px+=3)
    if(data[(py*W+px)*4]>90) pixels.push({x:px,y:py});

  if(pixels.length===0) return; // font not ready fallback

  for(let i=0;i<TP_COUNT;i++){
    const p=pixels[i%pixels.length];
    tpTargetPos[i*3]  =(p.x/W-0.5)*15   + (Math.random()-0.5)*0.12;
    tpTargetPos[i*3+1]=(0.5-p.y/H)*3.8  + 4 + (Math.random()-0.5)*0.12;
    tpTargetPos[i*3+2]= 8               + (Math.random()-0.5)*0.3;
  }
  tpBuilt=true;
}

function tickTextParticles(dt){
  if(tpDir===0) return;
  const speed=0.55;
  tpProgress=clamp(tpProgress+tpDir*dt*speed,0,1);
  const T=easeOut(tpProgress);
  const posAttr=tpGeo.attributes.position;
  for(let i=0;i<TP_COUNT;i++){
    // Stagger: leading edge of wave based on x-target position
    const stagger=clamp((tpTargetPos[i*3]+7.5)/15,0,1)*0.35;
    const localT=clamp((T-stagger)/(1-0.35),0,1);
    const lt=easeOut(localT);
    posAttr.array[i*3]  =lerp(tpInitPos[i*3],  tpTargetPos[i*3],  lt);
    posAttr.array[i*3+1]=lerp(tpInitPos[i*3+1],tpTargetPos[i*3+1],lt);
    posAttr.array[i*3+2]=lerp(tpInitPos[i*3+2],tpTargetPos[i*3+2],lt);
  }
  posAttr.needsUpdate=true;
  tpMat.opacity=clamp(tpProgress*4,0,1)*clamp(1-Math.max(0,tpProgress-0.9)/0.1,0,1);
  if(tpDir===1&&tpProgress>=1)  tpDir=0;
  if(tpDir===-1&&tpProgress<=0){ tpDir=0; tpMat.opacity=0; }
}

/* ────────────────────────────────────────────────────────────────
   SECTION L · PHYSICS SYSTEM  (+ slow-motion support)
──────────────────────────────────────────────────────────────── */
let physOn=false;
const GRAVITY=-0.0075, BOUNCE=0.30, FRICTION=0.974;

function activatePhysics(){
  if(physOn) return;
  physOn=true; floorMesh.visible=true;
  cookieObjects.forEach(obj=>{
    const wp=new THREE.Vector3(); obj.mesh.getWorldPosition(wp);
    const wr=new THREE.Euler(); wr.setFromRotationMatrix(obj.mesh.matrixWorld);
    trayGroup.remove(obj.mesh);
    obj.mesh.position.copy(wp); obj.mesh.rotation.copy(wr); scene.add(obj.mesh);
    obj.vel.set((Math.random()-0.5)*0.14,0.06+Math.random()*0.12,(Math.random()-0.5)*0.14);
    obj.physics=true; obj.settled=false;
  });
  spawnCrumbs();
  addTrauma(0.5); // camera shake on fall
  playCrumble();
}
function deactivatePhysics(){
  if(!physOn) return;
  physOn=false; floorMesh.visible=false;
  cookieObjects.forEach(obj=>{
    if(!obj.physics) return; obj.physics=false;
    scene.remove(obj.mesh); trayGroup.add(obj.mesh);
    gsap.to(obj.mesh.position,{x:obj.origPos.x,y:obj.origPos.y,z:obj.origPos.z,duration:2.2,ease:'power3.out'});
    gsap.to(obj.mesh.rotation,{x:obj.origRot.x,y:obj.origRot.y,z:obj.origRot.z,duration:2.2,ease:'power3.out'});
  });
  crumbs.material.opacity=0;
}
function spawnCrumbs(){
  for(let i=0;i<CRUMB;i++){
    const obj=cookieObjects[i%cookieObjects.length];
    const wp=obj.mesh.position;
    crPos[i*3]=wp.x+(Math.random()-0.5)*1.5;
    crPos[i*3+1]=wp.y+(Math.random()-0.5)*0.5;
    crPos[i*3+2]=wp.z+(Math.random()-0.5)*1.5;
    crVel[i].x=(Math.random()-0.5)*0.09; crVel[i].y=0.02+Math.random()*0.07; crVel[i].z=(Math.random()-0.5)*0.09;
    crVel[i].alive=1;
  }
  crumbGeo.attributes.position.needsUpdate=true; crumbs.material.opacity=0.75;
}
function tickPhysics(timeScale){
  if(!physOn) return;
  const ts=timeScale;
  for(let i=0;i<cookieObjects.length;i++){
    const o=cookieObjects[i]; if(!o.physics||o.settled) continue;
    o.vel.y+=GRAVITY*ts;
    o.mesh.position.addScaledVector(o.vel,ts);
    o.mesh.rotation.x+=o.angVel.x*ts; o.mesh.rotation.y+=o.angVel.y*ts; o.mesh.rotation.z+=o.angVel.z*ts;
    const floor=FLOOR_Y+o.radius;
    if(o.mesh.position.y<=floor){
      o.mesh.position.y=floor; o.vel.y*=-BOUNCE;
      o.vel.x*=FRICTION; o.vel.z*=FRICTION; o.angVel.multiplyScalar(0.88);
      if(Math.abs(o.vel.y)<0.005) o.vel.y=0;
    }
    // Cookie-cookie collision
    for(let j=i+1;j<cookieObjects.length;j++){
      const b=cookieObjects[j]; if(!b.physics) continue;
      const dx=o.mesh.position.x-b.mesh.position.x, dy=o.mesh.position.y-b.mesh.position.y, dz=o.mesh.position.z-b.mesh.position.z;
      const d=Math.sqrt(dx*dx+dy*dy+dz*dz), mn=o.radius+b.radius+0.08;
      if(d<mn&&d>0.001){
        const nx=dx/d,ny=dy/d,nz=dz/d,ov=(mn-d)*0.5;
        o.mesh.position.x+=nx*ov; o.mesh.position.y+=ny*ov; o.mesh.position.z+=nz*ov;
        b.mesh.position.x-=nx*ov; b.mesh.position.y-=ny*ov; b.mesh.position.z-=nz*ov;
        const rv=(o.vel.x-b.vel.x)*nx+(o.vel.y-b.vel.y)*ny+(o.vel.z-b.vel.z)*nz, imp=rv*0.42;
        o.vel.x-=imp*nx; o.vel.y-=imp*ny; o.vel.z-=imp*nz;
        b.vel.x+=imp*nx; b.vel.y+=imp*ny; b.vel.z+=imp*nz;
      }
    }
  }
  // Crumbs
  let alive=false;
  for(let i=0;i<CRUMB;i++){
    if(!crVel[i].alive) continue; alive=true;
    crPos[i*3]+=crVel[i].x*ts; crPos[i*3+1]+=crVel[i].y*ts; crVel[i].y-=0.003*ts;
    crPos[i*3+2]+=crVel[i].z*ts;
    if(crPos[i*3+1]<FLOOR_Y){ crVel[i].alive=0; crPos[i*3+1]=FLOOR_Y; }
  }
  crumbGeo.attributes.position.needsUpdate=true;
  if(!alive&&crumbs.material.opacity>0) crumbs.material.opacity=Math.max(0,crumbs.material.opacity-0.004);
}

  {t:0.67,pos:[6,8,18],   tgt:[0,0,0]  },
  {t:0.80,pos:[0,7,22],   tgt:[0,3,0]  },
  {t:0.92,pos:[0,8,24],   tgt:[0,4,0]  },
  {t:1.00,pos:[0,9,26],   tgt:[0,5,0]  },
];
function getCamAt(t){
  const kf=CAM_PATH; let i=0;
  while(i<kf.length-1&&kf[i+1].t<=t) i++;
  if(i>=kf.length-1){ const L=kf[kf.length-1]; return{pos:new THREE.Vector3(...L.pos),tgt:new THREE.Vector3(...L.tgt)}; }
  const a=kf[i],b=kf[i+1], lt=ease((t-a.t)/(b.t-a.t));
  return{
    pos:new THREE.Vector3(lerp(a.pos[0],b.pos[0],lt),lerp(a.pos[1],b.pos[1],lt),lerp(a.pos[2],b.pos[2],lt)),
    tgt:new THREE.Vector3(lerp(a.tgt[0],b.tgt[0],lt),lerp(a.tgt[1],b.tgt[1],lt),lerp(a.tgt[2],b.tgt[2],lt)),
  };
}

// ── Camera shake (trauma system) ─────────────────────────────
const shake={trauma:0, seed:Math.random()*100};
function addTrauma(amount){ shake.trauma=clamp(shake.trauma+amount,0,1); }
function tickShake(dt, baseT){
  shake.trauma=Math.max(0, shake.trauma-dt*1.2); // decay
  const s2=shake.trauma*shake.trauma;
  const t=baseT*12;
  return{
    x: noise1D(t,    shake.seed)*s2*0.55,
    y: noise1D(t+50, shake.seed)*s2*0.35,
    z: noise1D(t+100,shake.seed)*s2*0.20,
  };
}

// ── Slow motion ───────────────────────────────────────────────
let timeScale=1.0, targetTimeScale=1.0;
function setSlowMo(on){
  targetTimeScale = on ? 0.20 : 1.0;
  document.getElementById('slowmo-badge').style.opacity = on ? '1' : '0';
}

// ── Camera lerp state ─────────────────────────────────────────
const camCur={pos:new THREE.Vector3(0,22,42), tgt:new THREE.Vector3(0,0,0)};
let scrollVel=0, prevScrollY=0;

/* ────────────────────────────────────────────────────────────────
   SECTION N · INTERACTIONS (scroll, mouse, hover raycaster)
──────────────────────────────────────────────────────────────── */
let scrollT=0;
window.addEventListener('scroll',()=>{
  const max=document.documentElement.scrollHeight-innerHeight;
  scrollT=clamp(window.scrollY/max,0,1);
  initSound(); // first scroll = unlock audio
},{passive:true});

const mouse={x:0,y:0,vx:0,vy:0,px:0,py:0};
document.addEventListener('mousemove',e=>{
  mouse.vx=(e.clientX/innerWidth-0.5)*2 - mouse.px;
  mouse.vy=-(e.clientY/innerHeight-0.5)*2 - mouse.py;
  mouse.x=(e.clientX/innerWidth-0.5)*2;
  mouse.y=-(e.clientY/innerHeight-0.5)*2;
  mouse.px=mouse.x; mouse.py=mouse.y;
});

// ── Cookie hover (desktop raycaster) ─────────────────────────
const raycaster=new THREE.Raycaster();
const mouseNDC=new THREE.Vector2();
let hoveredCookie=null;
function tickHover(){
  if(physOn) return; // no hover during physics
  mouseNDC.x=mouse.x; mouseNDC.y=mouse.y;
  raycaster.setFromCamera(mouseNDC,camera);
  const meshes=cookieObjects.map(o=>o.mesh);
  const hits=raycaster.intersectObjects(meshes,true);
  const newHit = hits.length>0 ? cookieObjects.find(c=>c.mesh===hits[0].object||c.mesh.getObjectById(hits[0].object.id)) : null;
  if(newHit!==hoveredCookie){
    if(hoveredCookie){ gsap.to(hoveredCookie.mesh.scale,{x:1,y:1,z:1,duration:0.3,ease:'power2.out'}); hoveredCookie.hovered=false; }
    hoveredCookie=newHit;
    if(hoveredCookie){ gsap.to(hoveredCookie.mesh.scale,{x:1.07,y:1.07,z:1.07,duration:0.35,ease:'back.out(2)'}); hoveredCookie.hovered=true; }
    document.body.classList.toggle('hovering',!!hoveredCookie);
  }
}

/* ────────────────────────────────────────────────────────────────
   SECTION O · SCENE STORYTELLING (per-scene atmosphere)
──────────────────────────────────────────────────────────────── */
const SCENE_LABELS=[
  {num:'I',  name:'The Arrival' },
  {num:'II', name:'The Reveal'  },
  {num:'III',name:'The Dance'   },
  {num:'IV', name:'The Fall'    },
  {num:'V',  name:'The Blessing'},
];
let curScene=-1, msgVisible=false, celebOn=false;

// Per-scene cinematic configurations
const SCENE_CFG=[
  // Scene 0: Mystery — very dark, minimal bloom
  {bloom:{str:0.45,rad:0.3,thr:0.88},fog:0.040,exp:1.05,drama:0.0,dof:0.0},
  // Scene 1: Reveal — warm bloom begins, golden light
  {bloom:{str:0.70,rad:0.4,thr:0.80},fog:0.028,exp:1.20,drama:0.1,dof:0.0},
  // Scene 2: Beauty — full warm bloom, orbit
  {bloom:{str:0.90,rad:0.45,thr:0.74},fog:0.022,exp:1.30,drama:0.0,dof:0.0},
  // Scene 3: Impact / Fall — high bloom, drama vignette, slow-mo
  {bloom:{str:1.30,rad:0.50,thr:0.68},fog:0.018,exp:1.40,drama:0.55,dof:0.4},
  // Scene 4: Celebration — max bloom, celebration lights
  {bloom:{str:1.60,rad:0.55,thr:0.60},fog:0.012,exp:1.50,drama:0.0,dof:0.0},
];

// Current state with smooth lerp
const atmState={
  bloomStr:0.45, bloomRad:0.3, bloomThr:0.88,
  fog:0.040, exp:1.05, drama:0.0, dof:0.0,
};

function updateSceneMeta(t, dt){
  let s=0;
  if(t>0.10) s=1; if(t>0.35) s=2; if(t>0.55) s=3; if(t>0.75) s=4;

  if(s!==curScene){
    curScene=s;
    document.getElementById('sl-num').textContent  =SCENE_LABELS[s].num;
    document.getElementById('sl-name').textContent =SCENE_LABELS[s].name;
    gsap.fromTo('#scene-label',{opacity:0},{opacity:1,duration:0.5});
    gsap.to('#scene-label',{opacity:0,duration:0.5,delay:3.5});
    document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===s));
    // Transitions
    if(s===3){ activatePhysics(); setSlowMo(true); }
    if(s!==3&&curScene===3){ deactivatePhysics(); setSlowMo(false); }
    if(s===2){ addTrauma(0.08); } // subtle shake on orbit start
  }

  // Smooth atmosphere lerp
  const cfg=SCENE_CFG[s];
  const sp=Math.min(1, dt*1.8);
  atmState.bloomStr=lerp(atmState.bloomStr,cfg.bloom.str,sp);
  atmState.bloomRad=lerp(atmState.bloomRad,cfg.bloom.rad,sp);
  atmState.bloomThr=lerp(atmState.bloomThr,cfg.bloom.thr,sp);
  atmState.fog     =lerp(atmState.fog,     cfg.fog,      sp);
  atmState.exp     =lerp(atmState.exp,     cfg.exp,      sp);
  atmState.drama   =lerp(atmState.drama,   cfg.drama,    sp);
  atmState.dof     =lerp(atmState.dof,     cfg.dof,      sp);

  // Apply to post-processing
  bloomPass.strength  = atmState.bloomStr;
  bloomPass.radius    = atmState.bloomRad;
  bloomPass.threshold = atmState.bloomThr;
  dofPass.uniforms.blur.value = atmState.dof;
  scene.fog.density = atmState.fog;
  renderer.toneMappingExposure = atmState.exp;
  document.getElementById('vignette-drama').style.opacity = atmState.drama.toFixed(3);

  // Lighting reveal
  lightReveal = clamp((t-0.04)/0.20, 0, 1);

  // Message overlay
  const msgT=clamp((t-0.74)/0.06,0,1);
  document.getElementById('msg-overlay').style.opacity=msgT;
  if(msgT>0.1&&!msgVisible){
    msgVisible=true;
    gsap.to('#mm', {opacity:1,y:0,duration:1.8,delay:0.1,ease:'power3.out'});
    gsap.to('#md1',{opacity:1,duration:1.2,delay:0.6});
    gsap.to('#ms', {opacity:1,y:0,duration:1.8,delay:0.8,ease:'power3.out'});
    gsap.to('#md2',{opacity:1,duration:1.2,delay:1.2});
    gsap.to('#mf', {opacity:1,duration:1.4,delay:1.4});
    // Text particles form
    if(tpBuilt){ tpDir=1; tpProgress=0; }
  }
  if(msgT<0.05&&msgVisible){
    msgVisible=false;
    gsap.set(['#mm','#ms','#md1','#md2','#mf'],{opacity:0,y:24});
    gsap.set(['#mf','#md1','#md2'],{y:0});
    tpDir=-1;
  }

  // Celebration
  if(t>0.84&&!celebOn){
    celebOn=true; launchFW();
    gsap.to([cel1,cel2,cel3],{intensity:5,duration:0.4});
  }
  if(t<0.84&&celebOn){
    celebOn=false; fwAlive=false; fwMat.opacity=0;
    cel1.intensity=cel2.intensity=cel3.intensity=0;
  }
}

/* ────────────────────────────────────────────────────────────────
   SECTION P · MAIN RENDER LOOP
──────────────────────────────────────────────────────────────── */
let globalT=0, ready=false;
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  if(!ready) return;

  const rawDt = Math.min(clock.getDelta(), 0.05); // cap at 50ms
  // Lerp timeScale
  timeScale=lerp(timeScale,targetTimeScale,0.06);
  const dt = rawDt; // UI/camera updates always realtime
  const pDt= rawDt*timeScale; // physics-driven updates use timescale
  globalT+=dt;

  // ── Scroll velocity ──────────────────────────────────────────
  const sy=window.scrollY;
  scrollVel=lerp(scrollVel,(sy-prevScrollY)*0.016,0.12); // per-second estimate
  prevScrollY=sy;

  // ── Camera path + parallax ───────────────────────────────────
  const want=getCamAt(scrollT);
  const PARA=0.28;
  const shakeDelta=tickShake(dt,globalT);
  // Slight camera tilt based on scroll speed
  const tiltX = scrollVel*0.008;
  const tx=want.pos.x + mouse.x*PARA + shakeDelta.x;
  const ty=want.pos.y + mouse.y*PARA*0.5 + shakeDelta.y + tiltX;
  const tz=want.pos.z + shakeDelta.z;
  camCur.pos.x=lerp(camCur.pos.x,tx,0.045);
  camCur.pos.y=lerp(camCur.pos.y,ty,0.045);
  camCur.pos.z=lerp(camCur.pos.z,tz,0.045);
  camCur.tgt.x=lerp(camCur.tgt.x,want.tgt.x,0.042);
  camCur.tgt.y=lerp(camCur.tgt.y,want.tgt.y,0.042);
  camCur.tgt.z=lerp(camCur.tgt.z,want.tgt.z,0.042);
  camera.position.copy(camCur.pos);
  camera.lookAt(camCur.tgt);

  // ── Tray rotation ────────────────────────────────────────────
  if(!physOn) trayGroup.rotation.y=globalT*0.08;

  // ── Cookie wave (scenes 2-3, pre-physics) ───────────────────
  if(scrollT>0.25&&scrollT<0.55&&!physOn){
    cookieObjects.forEach((o,i)=>{
      o.mesh.position.y=o.origPos.y+Math.sin(globalT*1.4+i*0.7)*0.045;
      o.mesh.rotation.z=o.origRot.z+Math.sin(globalT*0.9+i*0.5)*0.016;
    });
  }

  // ── Dust float ───────────────────────────────────────────────
  for(let i=0;i<DUST;i++){
    dPos[i*3+1]+=Math.sin(globalT*0.6+dPhase[i])*0.0016;
    dPos[i*3]  +=Math.cos(globalT*0.4+dPhase[i])*0.0011;
    if(dPos[i*3+1]>8) dPos[i*3+1]-=16;
  }
  dustGeo.attributes.position.needsUpdate=true;

  // ── Systems ───────────────────────────────────────────────────
  tickPhysics(timeScale);
  tickFW(timeScale);
  tickTextParticles(dt);
  tickFlicker(dt);
  tickFlares();
  tickHover();
  updateSceneMeta(scrollT,dt);

  // ── Key light gentle sway ────────────────────────────────────
  key.position.x=Math.sin(globalT*0.22)*2.2+4;

  // ── Render ───────────────────────────────────────────────────
  composer.render();
}

/* ────────────────────────────────────────────────────────────────
   SECTION Q · CUSTOM CURSOR + RESIZE
──────────────────────────────────────────────────────────────── */
const cur=document.getElementById('cursor');
const curRing=document.getElementById('cursor-ring');
let rx2=innerWidth/2, ry2=innerHeight/2;
document.addEventListener('mousemove',e=>{ rx2=e.clientX; ry2=e.clientY; });

function tickCursor(){
  cur.style.left=rx2+'px'; cur.style.top=ry2+'px';
  const rrl=parseFloat(curRing.style.left||innerWidth/2);
  const rrt=parseFloat(curRing.style.top ||innerHeight/2);
  curRing.style.left=lerp(rrl,rx2,0.1)+'px';
  curRing.style.top =lerp(rrt,ry2,0.1)+'px';
  requestAnimationFrame(tickCursor);
}
tickCursor();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
  bloomPass.setSize(innerWidth,innerHeight);
});

/* ────────────────────────────────────────────────────────────────
   SECTION R · LOADING  +  INIT
──────────────────────────────────────────────────────────────── */
async function intro(){
  const ld=document.getElementById('loading');
  const lp2=document.getElementById('lp');
  const lt2=document.getElementById('lt');
  const lb2=document.getElementById('lb');
  const lbw2=document.getElementById('lbw');

  // Start building text targets in parallel (font may not be ready yet)
  buildTextTargets();

  await sleep(450);
  gsap.to(lp2,{opacity:1,duration:2.0,ease:'power2.inOut'});
  await sleep(700);
  gsap.to(lbw2,{opacity:1,duration:0.8});
  lb2.style.transition='width 1.6s cubic-bezier(0.4,0,0.2,1)';
  lb2.style.width='55%';
  await sleep(900);
  gsap.to(lt2,{opacity:1,duration:1.6,ease:'power2.inOut'});
  lb2.style.width='88%';
  await sleep(1000);
  lb2.style.width='100%';
  await sleep(600);

  gsap.to(ld,{
    opacity:0, duration:1.8, ease:'power2.inOut',
    onComplete:()=>{
      ld.style.display='none';
      ready=true; clock.start();
      // Reveal HUD
      gsap.to('#scroll-hint',{opacity:1,duration:1.2,delay:0.5});
      gsap.to('#dots',{opacity:1,duration:1,delay:0.7});
      gsap.to('#scene-label',{opacity:1,duration:1,delay:0.7});
      gsap.to('#mute-btn',{opacity:1,duration:1,delay:1.0});
      // Initial cinematic light reveal (Scene I: mystery)
      gsap.to({val:0},{
        val:1, duration:3.5, delay:0.3, ease:'power2.inOut',
        onUpdate:function(){ lightReveal=this.targets()[0].val; }
      });
      // Hide scroll hint on first scroll
      window.addEventListener('scroll',()=>{
        gsap.to('#scroll-hint',{opacity:0,duration:0.7});
      },{once:true});
    }
  });
}

animate();
intro();
</script>
